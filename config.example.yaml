# MCP Gateway — Example Configuration
# ─────────────────────────────────────────────────────────────────────
# Wires the four example servers to demonstrate every gateway pattern.
#
# Quick start:
#   1. Start the HTTP calc server:  python examples/http_calc_server.py
#   2. Start the gateway:           mcp-gateway -c config.example.yaml
#   3. Connect any MCP client to:   http://127.0.0.1:8080/mcp

host: "127.0.0.1"
port: 8080
path: "/mcp"
name: "mcp-gateway"
version: "0.1.0"
log_level: "info"

mcp_servers:

  # ── 1. Echo (stdio) ─────────────────────────────────────────────
  # Pattern: basic stdio transport, tools only, no filtering
  echo:
    command: "python3"
    args: ["examples/echo_server.py"]
    tools:
      resources: false
      prompts: false

  # ── 2. Knowledge (stdio) ────────────────────────────────────────
  # Pattern: resources + prompts enabled, whitelist filtering on tools
  knowledge:
    command: "python3"
    args: ["examples/knowledge_server.py"]
    tools:
      include: [search]          # only expose the search tool
      resources: true            # expose resources (articles)
      prompts: true              # expose prompts (summarize, explain)

  # ── 3. Calc (HTTP) ──────────────────────────────────────────────
  # Pattern: HTTP upstream transport, blacklist filtering
  # Requires: python examples/http_calc_server.py  (runs on port 8081)
  calc:
    url: "http://127.0.0.1:8081/mcp"
    timeout: 10
    connect_timeout: 5
    tools:
      exclude: [divide]          # block the divide tool
      resources: false
      prompts: false

  # ── 4. Dynamic (stdio) ──────────────────────────────────────────
  # Pattern: dynamic tool discovery (tools rotate every 30s)
  dynamic:
    command: "python3"
    args: ["examples/dynamic_server.py"]
    tools:
      resources: false
      prompts: false

  # ── 5. Disabled (stdio) ─────────────────────────────────────────
  # Pattern: server kept in config but not connected
  disabled_example:
    command: "python3"
    args: ["examples/echo_server.py"]
    enabled: false
