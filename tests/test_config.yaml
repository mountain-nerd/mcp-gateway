# Test config — stdio servers only (no HTTP dependency)
host: "127.0.0.1"
port: 9123
path: "/mcp"
name: "test-gateway"
log_level: "debug"

mcp_servers:
  echo:
    command: "python3"
    args: ["examples/echo_server.py"]
    tools:
      resources: false
      prompts: false

  knowledge:
    command: "python3"
    args: ["examples/knowledge_server.py"]
    tools:
      include: [search]
      resources: true
      prompts: true

  dynamic:
    command: "python3"
    args: ["examples/dynamic_server.py"]
    tools:
      resources: false
      prompts: false
